<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>pg_dump viewer</title>
<style>
  :root{
    --bg:#0d1117;
    --panel:#11161d;
    --line:#232b36;
    --text:#d9e2ec;
    --dim:#7f8ea3;
    --accent:#5ee6b4;
    --accent-dim:#1d3b32;
    --mono: 'SF Mono', 'Menlo', 'Consolas', monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; height:100vh; background:var(--bg); color:var(--text);
    font-family:var(--mono); font-size:13px; display:flex; flex-direction:column;
  }
  header{
    padding:14px 20px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:16px; flex-shrink:0;
  }
  header h1{
    font-size:14px; margin:0; letter-spacing:.5px; color:var(--accent);
    font-weight:600;
  }
  header .sub{color:var(--dim); font-size:12px;}
  #dropzone{
    flex:1; display:flex; align-items:center; justify-content:center;
    flex-direction:column; gap:14px; color:var(--dim);
  }
  #dropzone.drag{ background:var(--accent-dim); }
  #dropzone .box{
    border:1px dashed var(--line); border-radius:8px; padding:40px 60px;
    text-align:center; cursor:pointer; transition:border-color .15s;
  }
  #dropzone .box:hover{ border-color:var(--accent); }
  #dropzone .box strong{ color:var(--text); display:block; margin-bottom:6px; font-size:14px;}
  #fileInput{display:none;}
  #app{ flex:1; display:none; overflow:hidden; }
  #app.active{ display:flex; }
  #sidebar{
    width:230px; border-right:1px solid var(--line); overflow-y:auto; flex-shrink:0;
    background:var(--panel);
  }
  #sidebar .file-tag{
    padding:10px 14px; font-size:11px; color:var(--dim); border-bottom:1px solid var(--line);
    word-break:break-all;
  }
  .tbl-item{
    padding:9px 14px; cursor:pointer; border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; align-items:center;
    color:var(--dim);
  }
  .tbl-item:hover{ background:#161d26; color:var(--text); }
  .tbl-item.active{ background:var(--accent-dim); color:var(--accent); }
  .tbl-item .name{ font-weight:600; font-size:12.5px; }
  .tbl-item .count{
    font-size:10.5px; background:#1b232d; padding:1px 6px; border-radius:10px; color:var(--dim);
  }
  .tbl-item.active .count{ background:#173327; color:var(--accent); }
  #main{ flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #toolbar{
    padding:10px 16px; border-bottom:1px solid var(--line); display:flex; gap:10px; align-items:center;
    flex-shrink:0;
  }
  #toolbar input{
    background:#0b0f14; border:1px solid var(--line); color:var(--text); border-radius:6px;
    padding:6px 10px; font-family:var(--mono); font-size:12.5px; width:260px;
  }
  #toolbar input:focus{ outline:none; border-color:var(--accent); }
  #toolbar .tname{ font-size:13px; color:var(--text); font-weight:600; }
  #toolbar .meta{ margin-left:auto; color:var(--dim); font-size:11.5px; }
  #gridwrap{ flex:1; overflow:auto; }
  table.grid{ border-collapse:collapse; width:max-content; min-width:100%; }
  table.grid th{
    position:sticky; top:0; background:#151b23; text-align:left; padding:7px 12px;
    border-bottom:1px solid var(--line); border-right:1px solid var(--line);
    font-size:11px; color:var(--accent); white-space:nowrap; cursor:pointer; user-select:none;
  }
  table.grid th:hover{ color:var(--text); }
  table.grid th .arrow{ opacity:.5; margin-left:4px; }
  table.grid td{
    padding:6px 12px; border-bottom:1px solid #1a212a; border-right:1px solid #1a212a;
    white-space:pre; max-width:340px; overflow:hidden; text-overflow:ellipsis;
    font-size:12px; vertical-align:top;
  }
  table.grid td.null{ color:var(--dim); font-style:italic; }
  table.grid tr:hover td{ background:#12181f; }
  td.expandable{ cursor:pointer; }
  #empty-row td{ color:var(--dim); padding:20px; text-align:center; }
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-thumb{ background:#232b36; border-radius:5px; }
  ::-webkit-scrollbar-track{ background:var(--bg); }
  #modal-bg{
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.6);
    align-items:center; justify-content:center; z-index:10;
  }
  #modal-bg.active{ display:flex; }
  #modal{
    background:var(--panel); border:1px solid var(--line); border-radius:8px;
    max-width:70vw; max-height:70vh; overflow:auto; padding:18px 20px;
  }
  #modal h3{ margin:0 0 10px; color:var(--accent); font-size:12px; }
  #modal pre{ white-space:pre-wrap; word-break:break-word; margin:0; font-size:12.5px; line-height:1.5; }
  #modal .close{ float:right; cursor:pointer; color:var(--dim); }
</style>
</head>
<body>

<header>
  <h1>&#9670; pg_dump viewer</h1>
  <span class="sub" id="headerSub">upload a .sql dump to browse its tables</span>
</header>

<div id="dropzone">
  <div class="box" id="dropbox">
    <strong>Drop .sql file here, or click to choose</strong>
    parses COPY ... FROM stdin; blocks from a pg_dump file, entirely in your browser
  </div>
  <input type="file" id="fileInput" accept=".sql,.txt">
</div>

<div id="app">
  <div id="sidebar">
    <div class="file-tag" id="fileTag"></div>
    <div id="tblList"></div>
  </div>
  <div id="main">
    <div id="toolbar">
      <span class="tname" id="tname">—</span>
      <input type="text" id="search" placeholder="filter rows...">
      <span class="meta" id="meta"></span>
    </div>
    <div id="gridwrap">
      <table class="grid" id="grid">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="modal-bg">
  <div id="modal">
    <span class="close" onclick="closeModal()">&#10005; close</span>
    <h3 id="modalTitle">value</h3>
    <pre id="modalBody"></pre>
  </div>
</div>

<script>
let DB = {};        // { tableName: { columns:[], rows:[[...]] } }
let currentTable = null;
let sortState = {};  // per table: {col, dir}

const dropbox = document.getElementById('dropbox');
const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');

dropbox.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if(e.target.files[0]) handleFile(e.target.files[0]); });

['dragenter','dragover'].forEach(evt => dropzone.addEventListener(evt, e => {
  e.preventDefault(); dropzone.classList.add('drag');
}));
['dragleave','drop'].forEach(evt => dropzone.addEventListener(evt, e => {
  e.preventDefault(); dropzone.classList.remove('drag');
}));
dropzone.addEventListener('drop', e => {
  const f = e.dataTransfer.files[0];
  if(f) handleFile(f);
});

function handleFile(file){
  document.getElementById('fileTag').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    parseDump(e.target.result);
    document.getElementById('dropzone').style.display = 'none';
    document.getElementById('app').classList.add('active');
    document.getElementById('headerSub').textContent = file.name;
    renderTableList();
    const first = Object.keys(DB)[0];
    if(first) selectTable(first);
  };
  reader.readAsText(file);
}

// --- Parse pg_dump text: pull out COPY table (cols) FROM stdin; ... \. blocks ---
function parseDump(text){
  DB = {};
  const lines = text.split('\n');
  let i = 0;
  const copyRe = /^COPY\s+([^\s(]+)\s*\(([^)]*)\)\s+FROM\s+stdin;/i;
  while(i < lines.length){
    const m = lines[i].match(copyRe);
    if(m){
      let tableName = m[1].replace(/^public\./,'').replace(/"/g,'');
      const cols = m[2].split(',').map(c => c.trim().replace(/"/g,''));
      const rows = [];
      i++;
      while(i < lines.length && lines[i] !== '\\.'){
        const line = lines[i];
        rows.push(line.split('\t').map(v => v === '\\N' ? null : unescapeCopy(v)));
        i++;
      }
      DB[tableName] = { columns: cols, rows: rows };
      i++; // skip the \.
    } else {
      i++;
    }
  }
}

function unescapeCopy(v){
  return v
    .replace(/\\t/g,'\t')
    .replace(/\\n/g,'\n')
    .replace(/\\r/g,'\r')
    .replace(/\\\\/g,'\\');
}

function renderTableList(){
  const el = document.getElementById('tblList');
  el.innerHTML = '';
  const names = Object.keys(DB).sort();
  names.forEach(name => {
    const div = document.createElement('div');
    div.className = 'tbl-item' + (name === currentTable ? ' active' : '');
    div.innerHTML = `<span class="name">${name}</span><span class="count">${DB[name].rows.length}</span>`;
    div.onclick = () => selectTable(name);
    el.appendChild(div);
  });
}

function selectTable(name){
  currentTable = name;
  document.getElementById('search').value = '';
  if(!sortState[name]) sortState[name] = { col:null, dir:1 };
  renderTableList();
  renderGrid();
}

document.getElementById('search').addEventListener('input', renderGrid);

function renderGrid(){
  if(!currentTable) return;
  const data = DB[currentTable];
  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');
  document.getElementById('tname').textContent = currentTable;

  const filterVal = document.getElementById('search').value.toLowerCase();
  let rows = data.rows;
  if(filterVal){
    rows = rows.filter(r => r.some(cell => cell !== null && String(cell).toLowerCase().includes(filterVal)));
  }

  const st = sortState[currentTable];
  if(st.col !== null){
    const idx = st.col;
    rows = rows.slice().sort((a,b) => {
      const av = a[idx], bv = b[idx];
      if(av === null && bv === null) return 0;
      if(av === null) return 1;
      if(bv === null) return -1;
      const an = Number(av), bn = Number(bv);
      let cmp;
      if(!isNaN(an) && !isNaN(bn) && av !== '' && bv !== ''){ cmp = an - bn; }
      else { cmp = String(av).localeCompare(String(bv)); }
      return cmp * st.dir;
    });
  }

  document.getElementById('meta').textContent =
    `${rows.length} / ${data.rows.length} rows · ${data.columns.length} cols`;

  thead.innerHTML = '';
  const tr = document.createElement('tr');
  data.columns.forEach((c, idx) => {
    const th = document.createElement('th');
    let arrow = '';
    if(st.col === idx) arrow = st.dir === 1 ? ' &#9650;' : ' &#9660;';
    th.innerHTML = c + `<span class="arrow">${arrow}</span>`;
    th.onclick = () => {
      if(st.col === idx) st.dir *= -1; else { st.col = idx; st.dir = 1; }
      renderGrid();
    };
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  tbody.innerHTML = '';
  if(rows.length === 0){
    const tr2 = document.createElement('tr');
    tr2.id = 'empty-row';
    const td = document.createElement('td');
    td.colSpan = data.columns.length || 1;
    td.textContent = 'no matching rows';
    tr2.appendChild(td);
    tbody.appendChild(tr2);
    return;
  }

  const MAX_ROWS = 2000;
  const shown = rows.slice(0, MAX_ROWS);
  const frag = document.createDocumentFragment();
  shown.forEach(row => {
    const tr2 = document.createElement('tr');
    row.forEach((cell, ci) => {
      const td = document.createElement('td');
      if(cell === null){
        td.textContent = 'NULL';
        td.className = 'null';
      } else {
        const str = String(cell);
        td.textContent = str;
        if(str.length > 60){
          td.classList.add('expandable');
          td.title = 'click to expand';
          td.onclick = () => openModal(data.columns[ci], str);
        }
      }
      tr2.appendChild(td);
    });
    frag.appendChild(tr2);
  });
  tbody.appendChild(frag);
  if(rows.length > MAX_ROWS){
    const note = document.createElement('tr');
    const td = document.createElement('td');
    td.colSpan = data.columns.length;
    td.style.textAlign = 'center';
    td.style.color = 'var(--dim)';
    td.textContent = `... showing first ${MAX_ROWS} of ${rows.length} rows (use filter to narrow down)`;
    note.appendChild(td);
    tbody.appendChild(note);
  }
}

function openModal(col, val){
  document.getElementById('modalTitle').textContent = col;
  document.getElementById('modalBody').textContent = val;
  document.getElementById('modal-bg').classList.add('active');
}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('active');
}
document.getElementById('modal-bg').addEventListener('click', e => {
  if(e.target.id === 'modal-bg') closeModal();
});
</script>
</body>
</html>
